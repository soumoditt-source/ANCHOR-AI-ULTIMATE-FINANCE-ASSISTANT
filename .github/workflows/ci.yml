name: Anchor AI Production CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Executive Production Build
      run: npm run build
      env:
        CI: true
        # Environment variables inject via GitHub Secrets during production
        # VITE_FINNHUB_API_KEY: ${{ secrets.VITE_FINNHUB_API_KEY }}
        # VITE_COINGECKO_API_KEY: ${{ secrets.VITE_COINGECKO_API_KEY }}
        # VITE_NEWSDATA_API_KEY: ${{ secrets.VITE_NEWSDATA_API_KEY }}
        # VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
